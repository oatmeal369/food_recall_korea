name: Update I0490 recall data

on:
  workflow_dispatch:
  schedule:
    - cron: "20 */6 * * *"

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch I0490 data
        env:
          FOODSAFETY_SERVICE_KEY: ${{ secrets.FOODSAFETY_SERVICE_KEY }}
          FOODSAFETY_FORMAT: json
          FOODSAFETY_START: "1"
          FOODSAFETY_END: "1000"
        run: npm run update:data

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/recalls.json data/i0490-raw.json
          if git diff --cached --quiet; then
            echo "No data changes."
          else
            git commit -m "Update I0490 recall data"
            git push
          fi
