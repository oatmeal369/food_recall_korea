name: Update I0490 recall data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 18 * * *"

permissions:
  contents: write

jobs:
  update-recall-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Update I0490 recall data
        env:
          FOODSAFETY_SERVICE_KEY: ${{ secrets.FOODSAFETY_SERVICE_KEY }}
        run: npm run update:i0490

      - name: Commit updated recall data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/recalls.json
          git commit -m "Update I0490 recall data" || echo "No changes to commit"
          git push
